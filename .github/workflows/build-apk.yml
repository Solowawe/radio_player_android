name: Build Radio Player APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      android_api:
        description: 'Android API level'
        required: true
        default: '33'
        type: choice
        options:
          - '31'
          - '33'
          - '34'
          - '35'
      android_minapi:
        description: 'Minimum Android API level'
        required: true
        default: '21'
        type: choice
        options:
          - '21'
          - '24'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            libltdl-dev libffi-dev libssl-dev \
            libtool libtool-bin autoconf automake \
            ccache cmake
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36
          pip install --upgrade setuptools

      - name: Configure buildozer.spec for GitHub Actions
        working-directory: ./radio_player/android
        run: |
          # Применяем параметры из workflow_dispatch или используем значения по умолчанию
          ANDROID_API="${{ inputs.android_api || '33' }}"
          ANDROID_MINAPI="${{ inputs.android_minapi || '21' }}"

          # Обновляем buildozer.spec
          sed -i "s/^android.api = .*/android.api = $ANDROID_API/" buildozer.spec
          sed -i "s/^android.minapi = .*/android.minapi = $ANDROID_MINAPI/" buildozer.spec

          # Для GitHub Actions используем только arm64-v8a (экономит место и время)
          sed -i "s/^android.archs = .*/android.archs = arm64-v8a/" buildozer.spec

          echo "Configured: API=$ANDROID_API, minAPI=$ANDROID_MINAPI, archs=arm64-v8a"

      - name: Build APK with Buildozer
        working-directory: ./radio_player/android
        run: |
          yes | buildozer -v android debug 2>&1

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioPlayer-APK-${{ github.run_number }}
          path: ./radio_player/android/bin/*.apk
          if-no-files-found: error
          retention-days: 30
